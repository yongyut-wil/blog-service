name: Deploy Backend

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-update-infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/blog-service:${{ github.sha }}

      - name: Update Infrastructure Repo
        run: |
          git clone https://x-access-token:${{ secrets.INFRA_REPO_TOKEN }}@github.com/yongyut-wil/k8s-infra-webapp.git
          cd k8s-infra-webapp
          
          # เปลี่ยน Tag ในไฟล์ backend.yaml เป็น Commit ล่าสุด
          sed -i "s|image: ${{ secrets.DOCKER_USERNAME }}/blog-service:.*|image: ${{ secrets.DOCKER_USERNAME }}/blog-service:${{ github.sha }}|g" backend.yaml
          
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add backend.yaml
          
          # ตรวจสอบว่ามีการเปลี่ยนแปลงหรือไม่ ก่อน commit และ push
          if ! git diff-index --quiet HEAD; then
            git commit -m "Update backend image tag to ${{ github.sha }}"
            git push
          else
            echo "No changes to backend.yaml, skipping push."
          fi